name: FVT Monitor

# Monthly refresh: pull ED's latest Scorecard data, rebuild Value Check, and commit a
# dated snapshot so the FVT/GE Monitor accumulates a diffable history ED does not keep.
on:
  schedule:
    - cron: "0 12 8 * *"   # 08th of each month, 12:00 UTC
  workflow_dispatch: {}     # allow manual runs

permissions:
  contents: write           # to commit the snapshot + summary back to the repo

concurrency:
  group: fvt-monitor
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest Scorecard data (network)
        run: python -m pipeline.download

      - name: Build spine + Value Check + package data
        run: |
          python -m pipeline.build_spine
          python -m pipeline.value_check
          python -m pipeline.build_package_data

      - name: Refresh Careers demand layer (best-effort; BLS/NCES URLs can drift)
        run: |
          python -m pipeline.download_bls && python -m pipeline.build_careers_demand \
            || echo "Careers demand refresh skipped (source unavailable); wages unaffected."

      - name: Data-quality gate (fails the run on a bad refresh)
        run: python -m analysis.validate

      - name: Diff against the previous snapshot (skips on the first run)
        run: python -m pipeline.monitor_diff || echo "No prior snapshot yet, diff skipped."

      - name: Refresh the committed parquet build-source
        run: |
          cp data/parquet/value_check.parquet data/parquet/institutions.parquet published/
          cp data/parquet/careers_demand.parquet published/ 2>/dev/null || true

      - name: Commit snapshot + parquet source + package data if changed
        run: |
          git config user.name "truewise-bot"
          git config user.email "actions@users.noreply.github.com"
          git add archive/ published/ packages/truewise-data/truewise_data/data
          if git diff --cached --quiet; then
            echo "No changes this run."
          else
            git commit -m "FVT Monitor: refresh $(date -u +%Y-%m-%d)"
            git push
          fi
