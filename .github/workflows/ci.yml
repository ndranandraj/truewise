name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest

  build-site:
    name: Build static site
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      # The site is static (no build step yet). This job validates that the
      # publishable artifact exists; later iterations add a real generator.
      - name: Verify site artifact
        run: test -f site/index.html && test -f site/styles.css

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site

  # Deploy runs only on pushes to main. It is intentionally a no-op placeholder
  # until Cloudflare Pages is connected (see docs/GO_PUBLIC.md). Cloudflare Pages
  # can also deploy directly from the repo without this job; keep whichever you wire up.
  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: build-site
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deployment note
        run: echo "Connect Cloudflare Pages to auto-deploy site/ on push to main. See docs/GO_PUBLIC.md."
