name: Deploy site

# Build the site's generated JSON from the committed parquet source, then deploy the
# static site to Cloudflare with Wrangler. The 36MB of shard JSON is produced here at
# deploy time and never committed, so the repo stays lean as modules are added.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site data from the committed parquet source
        run: |
          mkdir -p data/parquet
          cp published/value_check.parquet published/institutions.parquet data/parquet/
          # Careers demand + K-12 are optional: copy in if a committed build-source exists.
          cp published/careers_demand.parquet data/parquet/ 2>/dev/null || true
          cp published/k12.parquet data/parquet/ 2>/dev/null || true
          python -m pipeline.build_site
          python -m pipeline.build_careers
          [ -f data/parquet/k12.parquet ] && python -m pipeline.build_k12 || echo "no k12 source, skipping"
          python -m analysis.summary

      - name: Data-quality gate + tests (block deploy on failure)
        run: |
          python -m analysis.validate
          pytest -q

      - name: Publish downloadable datasets on the domain
        # Serve the parquet(s) from truewise.dev/data/ so downloads hit Cloudflare and are
        # counted in the zone's request analytics. Kept out of the repo (built at deploy).
        run: |
          mkdir -p site/data
          cp published/value_check.parquet site/data/
          cp published/institutions.parquet site/data/ 2>/dev/null || true
          cp published/careers_demand.parquet site/data/ 2>/dev/null || true
          cp published/k12.parquet site/data/ 2>/dev/null || true

      - name: Inject Cloudflare Web Analytics token (or strip the beacon if unset)
        env:
          CF_BEACON_TOKEN: ${{ secrets.CF_BEACON_TOKEN }}
        run: |
          if [ -n "$CF_BEACON_TOKEN" ]; then
            find site -name '*.html' -exec sed -i "s/CF_BEACON_TOKEN/${CF_BEACON_TOKEN}/g" {} +
            echo "Injected Web Analytics token into site HTML."
          else
            find site -name '*.html' -exec sed -i '/cloudflareinsights\.com\/beacon/d' {} +
            echo "CF_BEACON_TOKEN not set; stripped the beacon tag (no analytics until the secret is added)."
          fi

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.111.0"
          command: deploy
