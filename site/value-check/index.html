<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Look up a US college | Truewise</title>
  <meta name="description" content="Look up a US college program and see whether its graduates typically out-earn a high-school graduate, using the Department of Education's own data." />
  <meta property="og:title" content="Value Check | Truewise" />
  <meta property="og:description" content="Does a college program's graduates out-earn a typical high-school graduate? Look it up." />
  <meta property="og:url" content="https://truewise.dev/value-check/" />
  <meta property="og:image" content="https://truewise.dev/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://truewise.dev/og.png" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .vc-search { padding: 48px 0 8px; }
    .vc-search h1 { font-size: clamp(1.9rem, 4vw, 2.8rem); letter-spacing: -0.03em; margin: 0 0 10px; }
    .vc-search p.lede { font-size: 1.1rem; }
    .searchbox {
      display: flex; align-items: center; gap: 10px; margin: 20px 0 6px;
      border: 2px solid var(--line); border-radius: 12px; padding: 4px 6px 4px 14px;
      max-width: 620px; background: #fff; transition: border-color .15s;
    }
    .searchbox:focus-within { border-color: var(--brand); }
    .searchbox input { border: 0; outline: 0; flex: 1; font-size: 1.1rem; padding: 12px 0; background: transparent; }
    .hint { color: var(--ink-soft); font-size: .9rem; margin: 4px 0 0; }
    .results { list-style: none; padding: 0; margin: 18px 0; max-width: 720px; }
    .results li { margin: 0 0 10px; }
    .school-card {
      display: block; text-decoration: none; color: inherit; border: 1px solid var(--line);
      border-radius: 12px; padding: 14px 16px; background: #fff; transition: border-color .15s, box-shadow .15s;
    }
    .school-card:hover { border-color: var(--brand); box-shadow: 0 4px 16px rgba(31,111,235,.08); }
    .school-card h3 { margin: 0 0 4px; font-size: 1.08rem; }
    .school-card .meta { color: var(--ink-soft); font-size: .9rem; }
    .mini { display: inline-flex; gap: 12px; margin-top: 8px; font-size: .88rem; }
    .mini .f { color: #b42318; font-weight: 700; }
    .mini .p { color: #067647; font-weight: 700; }
    .mini .i { color: #6b7688; }

    .backlink { display: inline-block; margin: 24px 0 8px; color: var(--brand); text-decoration: none; font-size: .95rem; }
    .backlink:hover { text-decoration: underline; }
    .school-head { padding: 8px 0 4px; }
    .school-head h1 { font-size: clamp(1.6rem, 3.5vw, 2.3rem); letter-spacing: -0.02em; margin: 0 0 6px; }
    .school-head .sub { color: var(--ink-soft); }
    .school-head .sub a { color: var(--brand); text-decoration: none; }
    .modules { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 18px 0 8px; }
    .mod { display: flex; flex-direction: column; gap: 2px; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; text-decoration: none; color: inherit; background: #fff; }
    .mod.live { border-color: var(--brand); }
    .mod.soon { opacity: .6; cursor: default; }
    .mod-name { font-weight: 700; font-size: .98rem; }
    .mod-blurb { font-size: .82rem; color: var(--ink-soft); }
    .mod-tag { margin-top: 6px; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .mod.live .mod-tag { color: var(--accent); }
    .mod.soon .mod-tag { color: #6b7688; }
    .module h2 { font-size: 1.3rem; letter-spacing: -.02em; margin: 26px 0 6px; }
    .summary {
      margin: 16px 0 6px; padding: 16px 18px; border-radius: 12px; background: var(--bg-alt);
      border: 1px solid var(--line); max-width: 760px; font-size: 1.02rem;
    }
    .insuff { color: var(--ink-soft); font-size: .95rem; margin: 8px 0 0; max-width: 760px; line-height: 1.55; }
    .insuff summary { color: var(--brand); cursor: pointer; display: inline; }
    .insuff details[open] summary { display: block; margin-bottom: 4px; }
    .insuff details span { display: block; margin-top: 4px; }
    .toggle { display: inline-flex; gap: 6px; margin: 18px 0 8px; flex-wrap: wrap; }
    .toggle button {
      border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 6px 14px;
      font-size: .9rem; cursor: pointer; color: var(--ink);
    }
    .toggle button[aria-pressed="true"] { background: var(--ink); color: #fff; border-color: var(--ink); }
    .prose-line { color: var(--ink-soft); max-width: 760px; margin: 6px 0 0; }
    .income-toggle { display: inline-flex; gap: 6px; margin: 14px 0 10px; flex-wrap: wrap; }
    .income-toggle button { border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 7px 15px; font-size: .9rem; cursor: pointer; color: var(--ink); }
    .income-toggle button[aria-pressed="true"] { background: var(--brand); color: #fff; border-color: var(--brand); }
    .income-toggle button:disabled { opacity: .4; cursor: not-allowed; }
    .afford-result { font-size: 1.15rem; color: var(--ink); max-width: 620px; margin: 6px 0; line-height: 1.5; }
    .afford-result .big { font-size: 1.5rem; color: var(--brand-deep); }
    .afford-result .empty { color: var(--ink-soft); font-size: 1rem; }
    .afford-note { color: var(--ink-soft); font-size: .85rem; max-width: 760px; margin: 12px 0 0; line-height: 1.55; }
    .afford-note a { color: var(--brand); }

    /* Mobility */
    .mob-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; margin: 16px 0 6px; max-width: 760px; }
    .mob-stat { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; background: #fff; }
    .mob-stat .v { font-size: 1.7rem; font-weight: 800; color: var(--brand-deep); font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
    .mob-stat .k { font-size: .92rem; color: var(--ink); margin-top: 3px; line-height: 1.4; }
    .mob-stat .k .sub { color: var(--ink-soft); font-size: .82rem; }
    .mob-stat .ctx { font-size: .8rem; color: var(--ink-soft); margin-top: 6px; }
    .gem { display: flex; gap: 14px; align-items: flex-start; margin: 16px 0; padding: 14px 18px; border-radius: 12px; background: #fffaf0; border: 1px solid #f2d98a; max-width: 760px; }
    .gem .badge-gem { font-weight: 800; color: #92610a; white-space: nowrap; }
    .gem p { margin: 0; color: var(--ink); font-size: .96rem; line-height: 1.5; }

    /* Careers (per-school) */
    .cr-sub { font-size: 1rem; margin: 18px 0 4px; color: var(--ink); }
    #careers .prog-table td.cname { white-space: normal; min-width: 220px; font-weight: 500; }
    #careers .prog-table td.cname a { color: var(--brand); text-decoration: none; }
    #careers .prog-table td.cname a:hover { text-decoration: underline; }
    #careers .prog-table .deg { color: var(--ink-soft); font-size: .85rem; }
    #careers .pos { color: #067647; font-weight: 600; } #careers .neg { color: #b42318; font-weight: 600; }

    /* Program table + controls */
    .vc-controls { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; align-items: center; margin: 14px 0 4px; }
    .vc-tools { display: flex; gap: 8px; }
    .vc-tools input, .vc-tools select { border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; font-size: .9rem; background: #fff; color: var(--ink); }
    .baseline { color: var(--ink-soft); font-size: .92rem; max-width: 760px; margin: 8px 0 0; }
    .table-wrap { overflow-x: auto; margin-top: 12px; border: 1px solid var(--line); border-radius: 12px; }
    .prog-table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    .prog-table th, .prog-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
    .prog-table thead th { background: var(--bg-alt); font-weight: 600; color: var(--ink-soft); position: sticky; top: 64px; z-index: 2; }
    .prog-table th.num, .prog-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .prog-table tbody tr:last-child td { border-bottom: 0; }
    .prog-table tbody tr.hl { background: rgba(31,111,235,.08); }
    .prog-table td.pname { white-space: normal; min-width: 220px; font-weight: 500; }
    .prog-table td.deg { color: var(--ink-soft); }
    .tag1yr { display: inline-block; font-size: .68rem; font-weight: 700; color: #92610a; background: #fef7e6; border-radius: 4px; padding: 1px 5px; vertical-align: middle; }
    .prem { min-width: 190px; }
    .prem-val { font-variant-numeric: tabular-nums; font-weight: 600; }
    .prem-val.pos { color: #067647; } .prem-val.neg { color: #b42318; }
    .minibar { position: relative; display: block; height: 6px; background: #eef1f6; border-radius: 3px; margin-top: 5px; }
    .minibar .fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; }
    .minibar .fill.pf { background: var(--accent); } .minibar .fill.nf { background: #e0736a; }
    .minibar .base { position: absolute; top: -2px; width: 2px; height: 10px; background: var(--ink); opacity: .55; }
    .insuff-view { margin-top: 12px; }
    .insuff-note { color: var(--ink-soft); font-size: .92rem; max-width: 760px; line-height: 1.55; }
    .insuff-list { columns: 2; column-gap: 28px; list-style: none; padding: 0; margin: 14px 0 0; }
    .insuff-list li { break-inside: avoid; padding: 4px 0; border-bottom: 1px solid var(--line); font-size: .92rem; }
    .insuff-list .deg { color: var(--ink-soft); font-size: .82rem; }
    #to-top { position: fixed; right: 20px; bottom: 20px; width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--line); background: #fff; color: var(--ink); font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.12); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 20; }
    #to-top.show { opacity: 1; pointer-events: auto; }
    @media (max-width: 560px) { .insuff-list { columns: 1; } .prog-table thead th { top: 0; } .vc-tools { width: 100%; } .vc-tools input { flex: 1; } }

    .prog { border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin: 0 0 12px; background: #fff; }
    .prog.hl { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(31,111,235,.12); }
    .prog .top { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
    .prog h3 { margin: 0; font-size: 1.06rem; }
    .prog .cred { color: var(--ink-soft); font-size: .9rem; margin-top: 2px; }
    .badge { font-size: .78rem; font-weight: 700; border-radius: 999px; padding: 4px 11px; white-space: nowrap; }
    .badge.fail { background: #fef3f2; color: #b42318; }
    .badge.pass { background: #ecfdf3; color: #067647; }
    .prog .line { margin: 10px 0 0; color: var(--ink); font-size: .98rem; }
    .prog .stats { display: flex; gap: 22px; flex-wrap: wrap; margin-top: 10px; color: var(--ink-soft); font-size: .9rem; }
    .prog .stats b { color: var(--ink); font-weight: 600; }
    .share-bar { height: 7px; background: #eef1f6; border-radius: 4px; overflow: hidden; max-width: 260px; margin-top: 6px; }
    .share-bar > span { display: block; height: 100%; background: var(--accent); }

    .caveats { margin: 28px 0; padding: 16px 18px; border-left: 4px solid var(--line); background: var(--bg-alt); border-radius: 0 12px 12px 0; max-width: 760px; color: var(--ink-soft); font-size: .92rem; }
    .caveats a { color: var(--brand); }
    .empty { color: var(--ink-soft); padding: 20px 0; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="/">true<span>wise</span></a>
      <nav aria-label="Primary">
        <a class="nav-cta" href="/value-check/">Find a college</a>
        <a href="/careers/">Careers</a>
        <a href="/k12/">High schools</a>
        <a href="/#data">Data</a>
        <a href="/#methodology">Methodology</a>
      </nav>
    </div>
  </header>

  <main class="wrap" id="app">
    <!-- rendered by JS -->
  </main>
  <button id="to-top" aria-label="Back to top" title="Back to top">↑</button>

  <script>
  const DATA_VINTAGE = "U.S. Dept. of Education College Scorecard, most recent release (2026-06-10)";
  const app = document.getElementById("app");
  let SCHOOLS = null;                 // school index
  let BENCH = {};                     // national benchmarks (mobility medians)
  let NATL = null;                    // national field medians (Careers), cip|credential -> field
  const stateCache = {};              // state -> {unitid: [programs]}

  const money = n => n == null ? "n/a" : "$" + Number(n).toLocaleString();
  const esc = s => (s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const horizonLabel = h => h === "1yr_after_completion" ? "1 year after completing"
                        : h === "4yr_after_completion" ? "4 years after completing" : "after completing";

  async function loadSchools() {
    if (SCHOOLS) return SCHOOLS;
    const r = await fetch("data/schools.json");
    const j = await r.json();
    SCHOOLS = j.schools;
    BENCH = j.benchmarks || {};
    return SCHOOLS;
  }
  async function loadState(state) {
    if (stateCache[state]) return stateCache[state];
    const r = await fetch("data/programs/" + state + ".json");
    stateCache[state] = r.ok ? await r.json() : {};
    return stateCache[state];
  }
  async function loadFields() {              // national field medians for the Careers section
    if (NATL) return NATL;
    NATL = {};
    try {
      const r = await fetch("/careers/data/fields.json");
      if (r.ok) (await r.json()).fields.forEach(f => { NATL[f.cip + "|" + f.credential] = f; });
    } catch (e) { /* Careers section simply won't render */ }
    return NATL;
  }

  function go(params, push = true) {
    const qs = new URLSearchParams(params).toString();
    const url = qs ? "?" + qs : location.pathname;
    if (push) history.pushState(params, "", url);
    route(params);
  }

  // ---- Search view ----
  async function renderSearch(preset = "") {
    await loadSchools();
    app.innerHTML = `
      <section class="vc-search">
        <h1>Look up any US college</h1>
        <p class="lede">Search a school for its Truewise profile, starting with Value Check:
          whether each program's graduates typically out-earn a high-school graduate, from the
          Department of Education's own data. More measures coming.</p>
        <div class="searchbox">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7688" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="q" type="search" autocomplete="off" placeholder="Search ${SCHOOLS.length.toLocaleString()} colleges by name…" value="${esc(preset)}" />
        </div>
        <p class="hint">Try “Baylor”, “Long Beach”, or your local community college.</p>
        <ul class="results" id="results"></ul>
      </section>`;
    const q = document.getElementById("q");
    const results = document.getElementById("results");
    let t;
    const run = () => {
      const term = q.value.trim().toLowerCase();
      if (term.length < 2) { results.innerHTML = `<li class="empty">Type at least two letters to search.</li>`; return; }
      const hits = SCHOOLS.filter(s => (s.name || "").toLowerCase().includes(term)).slice(0, 40);
      if (!hits.length) { results.innerHTML = `<li class="empty">No colleges match “${esc(term)}”.</li>`; return; }
      results.innerHTML = hits.map(s => `
        <li><a class="school-card" href="?school=${s.unitid}" data-u="${s.unitid}">
          <h3>${esc(s.name)}</h3>
          <div class="meta">${s.city ? esc(s.city) + ", " : ""}${esc(s.state)}${s.control ? " · " + esc(s.control) : ""}</div>
          <div class="mini">
            ${s.n_fail ? `<span class="f">${s.n_fail} fall short</span>` : ""}
            ${s.n_pass ? `<span class="p">${s.n_pass} pass</span>` : ""}
            ${s.n_insufficient ? `<span class="i">${s.n_insufficient} not enough data</span>` : ""}
          </div>
        </a></li>`).join("");
      results.querySelectorAll("a.school-card").forEach(a =>
        a.addEventListener("click", e => { e.preventDefault(); go({ school: a.dataset.u }); }));
    };
    q.addEventListener("input", () => { clearTimeout(t); t = setTimeout(run, 120); });
    q.focus();
    if (preset) run();
  }

  // ---- School view ----
  const CRED_SHORT = {
    "Bachelor's Degree": "Bachelor's", "Master's Degree": "Master's",
    "Doctoral Degree": "Doctoral", "Associate's Degree": "Associate's",
    "First Professional Degree": "First prof.", "Undergraduate Certificate or Diploma": "Undergrad cert",
    "Graduate/Professional Certificate": "Grad cert", "Post-baccalaureate Certificate": "Post-bacc cert",
  };
  const credShort = c => CRED_SHORT[c] || (c || "");
  const anchorFor = p => `${p.cip}-${(p.credential||"").replace(/\W+/g,"")}`;

  // Nominal time to finish, used only for the whole-degree cost view (undergraduate,
  // where net price applies). Stated as an assumption on the page.
  const PROG_YEARS = {
    "Bachelor's Degree": 4, "Associate's Degree": 2,
    "Undergraduate Certificate or Diploma": 1,
  };
  const median = arr => {
    if (!arr.length) return null;
    const s = arr.slice().sort((a, b) => a - b), m = Math.floor(s.length / 2);
    return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
  };

  // ROI module: debt payback (headline) + a whole-degree cost view for undergrad.
  function roiModule(progs, threshold, np) {
    const decided = progs.filter(p =>
      p.flag === "passes_earnings_premium" || p.flag === "fails_earnings_premium");
    if (!decided.length) return "";
    const paybacks = decided.map(p => p.payback).filter(v => v != null);
    const noPremium = decided.filter(p => p.flag === "fails_earnings_premium").length;
    let fastest = null;
    decided.forEach(p => { if (p.payback != null && (!fastest || p.payback < fastest.payback)) fastest = p; });

    let summary;
    if (paybacks.length) {
      const med = median(paybacks);
      const medTxt = (Math.round(med * 10) / 10);
      summary = `Across <b>${paybacks.length}</b> program${paybacks.length !== 1 ? "s" : ""} with both
        reported debt and an earnings premium, the typical one recoups what students borrowed in about
        <b class="big">${medTxt} year${medTxt === 1 ? "" : "s"}</b> of that premium`
        + (fastest ? `. Fastest here: <b>${esc(fastest.program)}</b>, about ${fastest.payback} year${fastest.payback === 1 ? "" : "s"}.` : ".");
    } else {
      summary = `No program here has both reported debt and an earnings premium, so a payback can't be computed.`;
    }
    if (noPremium) {
      summary += ` <span style="color:#b42318"><b>${noPremium}</b> program${noPremium !== 1 ? "s" : ""}</span>
        don't out-earn a high-school graduate, so they have no premium and don't pay back on this measure.`;
    }

    let costLine = "";
    if (np && np.avg != null) {
      const cost = decided
        .filter(p => p.flag === "passes_earnings_premium" && PROG_YEARS[p.credential]
                     && threshold != null && p.earnings != null && (p.earnings - threshold) > 0)
        .map(p => (np.avg * PROG_YEARS[p.credential]) / (p.earnings - threshold));
      if (cost.length) {
        const cmed = median(cost);
        costLine = `<p class="prose-line" style="margin-top:14px"><b>Counting the whole degree, not just loans:</b>
          at this school's average net price of <b>${money(np.avg)}</b> a year, a typical undergraduate program
          whose graduates clear the bar pays back its full cost in about <b>${cmed.toFixed(1)} years</b>
          (assuming the standard time to finish: 2 years for an associate's, 4 for a bachelor's). Adjust the
          family-income assumption under <a href="#affordability">Affordability</a> above.</p>`;
      }
    }

    return `
      <section id="roi" class="module">
        <h2>Return on investment: how fast does the payoff cover the cost?</h2>
        <p class="prose-line">A simple way to weigh a program: how many years of its earnings premium over a
          high-school graduate it takes to recoup what students borrowed. Lower is faster. See the
          <b>Debt payback</b> column in the table above for every program.</p>
        <div class="summary">${summary}</div>
        ${costLine}
        <p class="afford-note">Debt payback divides a program's median federal debt by its yearly earnings
          premium over a typical high-school graduate: how long that extra pay would take to cover what was
          borrowed. It counts only borrowed money, not grants or cash paid; the whole-degree view adds net
          price and assumes a standard time to finish. These describe past graduates, not a promise or advice.</p>
      </section>`;
  }

  // Mobility module: access (Pell / first-gen share) + completion + the earnings outcome,
  // each next to the national median, plus a rule-based hidden-gem badge.
  const pct = x => x == null ? null : Math.round(x * 100) + "%";
  function mobilityModule(s, bench) {
    const decided = s.n_pass + s.n_fail;
    const passRate = decided ? s.n_pass / decided : null;
    if (s.pell == null && s.completion == null && passRate == null) return "";
    const stat = (val, key, medianVal) => val == null ? "" :
      `<div class="mob-stat"><div class="v">${pct(val)}</div><div class="k">${key}</div>
       <div class="ctx">${medianVal != null ? "National median: " + pct(medianVal) : ""}</div></div>`;
    const stats = [
      stat(s.pell, "received a Pell grant<br><span class='sub'>low-income undergraduates</span>", bench.pell_median),
      stat(s.completion, "finished their program<br><span class='sub'>within 150% of normal time</span>", bench.completion_median),
      stat(passRate, "of programs clear the earnings bar<br><span class='sub'>graduates out-earn a HS grad</span>", bench.pass_rate_median),
    ].filter(Boolean).join("");
    const gem = s.hidden_gem ? `
      <div class="gem"><span class="badge-gem">★ Hidden gem</span>
        <p>This school enrolls <b>more low-income students</b> than most, <b>graduates more of them</b>, and its
          graduates <b>out-earn a high-school graduate more often</b> than most, beating the national median on all
          three. Colleges like this move students up without the selective-admissions spotlight.</p></div>` : "";
    const fg = s.first_gen != null
      ? ` About <b>${pct(s.first_gen)}</b> of students here are the first in their family to go to college.` : "";
    return `
      <section id="mobility" class="module">
        <h2>Mobility: who this school serves, and whether they get ahead</h2>
        <p class="prose-line">Whether a college moves people up comes down to two things: who it enrolls, and
          whether those students finish and earn a living.${fg}</p>
        ${gem}
        <div class="mob-stats">${stats}</div>
        <p class="afford-note">This is an access-and-outcomes view from College Scorecard, not the federal or
          Opportunity Insights income-mobility rate. Pell share is the share of undergraduates who received a Pell
          grant; completion is measured institution-wide at 150% of normal time; the earnings bar is the same one
          used in Value Check. Some schools don't report all three. "Hidden gem" means only that a school beats the
          national median on all three measures, a transparent rule, not a ranking.</p>
      </section>`;
  }

  // Careers section: how this school's majors pay against the same major nationally.
  function careersModule(progs, natl) {
    const decided = progs.filter(p =>
      p.flag === "passes_earnings_premium" || p.flag === "fails_earnings_premium");
    const withNatl = [];
    decided.forEach(p => {
      const nf = natl[p.cip + "|" + p.credential];
      if (nf && nf.med != null && p.earnings != null) withNatl.push({ p, nf, diff: p.earnings - nf.med });
    });
    if (withNatl.length < 3) return "";
    const above = withNatl.filter(x => x.diff > 0).sort((a, b) => b.diff - a.diff).slice(0, 5);
    const below = withNatl.filter(x => x.diff < 0).sort((a, b) => a.diff - b.diff).slice(0, 5);
    const row = x => `<tr>
      <td class="cname"><a href="/careers/?field=${x.p.cip}&cred=${x.nf.cred}" target="_blank" rel="noopener">${esc(x.p.program)}</a>
        <span class="deg">${esc(credShort(x.p.credential))}</span></td>
      <td class="num">${money(x.p.earnings)}</td>
      <td class="num">${money(x.nf.med)}</td>
      <td class="num"><span class="${x.diff >= 0 ? "pos" : "neg"}">${x.diff >= 0 ? "+" : "−"}${money(Math.abs(x.diff))}</span></td></tr>`;
    const tbl = (title, rows) => rows.length ? `<h3 class="cr-sub">${title}</h3>
      <div class="table-wrap"><table class="prog-table"><thead><tr><th>Major</th>
        <th class="num">This school</th><th class="num">Typical nationally</th><th class="num">Difference</th>
      </tr></thead><tbody>${rows.map(row).join("")}</tbody></table></div>` : "";
    return `
      <section id="careers" class="module">
        <h2>Careers: how this school's majors pay against the same major elsewhere</h2>
        <p class="prose-line">The same major can pay very differently depending on where you study. These compare
          this school's graduate earnings with the national median for the <em>same</em> field and degree.</p>
        ${tbl("Pays more than the typical program", above)}
        ${tbl("Pays less than the typical program", below)}
        <p class="afford-note">National medians pool every school reporting each major (four years after completing
          where available); only majors with enough programs nationwide to compare appear here. Browse any field in
          <a href="/careers/">Careers</a>. Descriptive of past graduates, not a promise.</p>
      </section>`;
  }

  function programRow(p, threshold, maxEarn, highlight) {
    const fail = p.flag === "fails_earnings_premium";
    const premium = (p.earnings != null && threshold != null) ? p.earnings - threshold : null;
    const premTxt = premium == null ? "n/a" : (premium < 0 ? "−" : "+") + money(Math.abs(premium));
    const w = (p.earnings != null && maxEarn) ? Math.max(2, Math.round(p.earnings / maxEarn * 100)) : 0;
    const bw = (threshold != null && maxEarn) ? Math.round(threshold / maxEarn * 100) : 0;
    const tag = p.horizon === "1yr_after_completion"
      ? ` <span class="tag1yr" title="Earnings measured 1 year after completing, not 4">1-yr</span>` : "";
    const paybackCell = p.payback != null
      ? `<span title="Years of the earnings premium over a HS grad needed to recoup the debt">${p.payback} yrs</span>`
      : (fail ? `<span title="No earnings premium over a HS grad, so the debt does not pay back on this measure">—</span>` : "n/a");
    return `<tr id="${anchorFor(p)}" class="${highlight ? "hl " : ""}${fail ? "row-fail" : "row-pass"}">
      <td class="pname">${esc(p.program)}${tag}</td>
      <td class="deg">${esc(credShort(p.credential))}</td>
      <td class="num">${money(p.earnings)}</td>
      <td class="prem">
        <span class="prem-val ${fail ? "neg" : "pos"}">${premTxt}</span>
        <span class="minibar"><i class="fill ${fail ? "nf" : "pf"}" style="width:${w}%"></i><i class="base" style="left:${bw}%"></i></span>
      </td>
      <td class="num">${money(p.debt)}</td>
      <td class="num">${p.debt_to_earnings != null ? p.debt_to_earnings.toFixed(2) + "×" : "n/a"}</td>
      <td class="num">${paybackCell}</td>
      <td class="num">${p.completers != null ? Number(p.completers).toLocaleString() : "n/a"}</td>
    </tr>`;
  }

  function programTable(rows) {
    return `<div class="table-wrap"><table class="prog-table">
      <thead><tr>
        <th>Program</th><th>Degree</th><th class="num">Earnings</th>
        <th>Premium vs HS grad</th><th class="num">Debt</th><th class="num">Debt/earn</th>
        <th class="num">Debt payback</th><th class="num">Grads</th>
      </tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  function sortProgs(list, sort, threshold) {
    const prem = p => (p.earnings != null && threshold != null) ? p.earnings - threshold : -Infinity;
    const cmp = {
      premium: (a, b) => prem(a) - prem(b),                       // worst (most below) first
      earnings: (a, b) => (b.earnings ?? -1) - (a.earnings ?? -1),
      debt: (a, b) => (b.debt ?? -1) - (a.debt ?? -1),
      payback: (a, b) => (a.payback ?? Infinity) - (b.payback ?? Infinity),  // fastest first
      grads: (a, b) => (b.completers ?? -1) - (a.completers ?? -1),
      name: (a, b) => (a.program || "").localeCompare(b.program || ""),
    }[sort] || ((a, b) => prem(a) - prem(b));
    return list.slice().sort(cmp);
  }

  async function renderSchool(unitid, programAnchor) {
    await loadSchools();
    const s = SCHOOLS.find(x => x.unitid === unitid);
    if (!s) { app.innerHTML = `<a class="backlink" href="#" id="back">← Search</a><p class="empty">School not found.</p>`; wireBack(); return; }
    const byId = await loadState(s.state);
    await loadFields();
    let progs = (byId[unitid] || []).slice();
    // fails first, then passes, each by descending |premium| then name
    progs.sort((a,b) => {
      const af = a.flag==="fails_earnings_premium", bf = b.flag==="fails_earnings_premium";
      if (af !== bf) return af ? -1 : 1;
      return (a.program||"").localeCompare(b.program||"");
    });
    const decided = s.n_fail + s.n_pass;
    const bits = [];
    if (s.city) bits.push(esc(s.city) + ", " + esc(s.state)); else bits.push(esc(s.state));
    if (s.control) bits.push(esc(s.control));
    if (s.enrollment) bits.push(Number(s.enrollment).toLocaleString() + " undergraduates");
    const website = s.url ? ` · <a href="${/^https?:/.test(s.url) ? s.url : "https://" + s.url}" target="_blank" rel="noopener">website ↗</a>` : "";
    const roiSection = roiModule(progs, s.threshold, s.net_price);
    const hasRoi = roiSection !== "";
    const mobilitySection = mobilityModule(s, BENCH);
    const hasMob = mobilitySection !== "";
    const careersSection = careersModule(progs, NATL || {});
    const hasCareers = careersSection !== "";
    const modules = [
      { name: "Value Check", live: true, anchor: "value-check", blurb: "Do graduates out-earn a HS grad?" },
      { name: "Affordability", live: !!s.net_price, anchor: "affordability", blurb: "What families really pay" },
      { name: "ROI", live: hasRoi, anchor: "roi", blurb: "Earnings vs debt, payback" },
      { name: "Mobility", live: hasMob, anchor: "mobility", blurb: "Moving students up" },
      { name: "Careers", live: hasCareers, anchor: "careers", blurb: "Where a major leads" },
    ];
    const totI = s.n_insufficient || 0;
    const iparts = [];
    if (s.n_insuff_grad) iparts.push(`${s.n_insuff_grad} graduate`);
    if (s.n_insuff_ug) iparts.push(`${s.n_insuff_ug} undergraduate`);
    const whyHtml = `The Department of Education only publishes a program's earnings when enough of
      its graduates received federal financial aid, so that individuals can't be identified. That
      mainly affects graduate programs, especially doctoral, where students are usually funded by
      stipends and assistantships rather than federal loans, so most suppressed programs are
      graduate level and undergraduate coverage is far more complete.`;
    const INCOME = [
      { label: "Under $30k", full: "under $30,000" },
      { label: "$30k to $48k", full: "between $30,000 and $48,000" },
      { label: "$48k to $75k", full: "between $48,000 and $75,000" },
      { label: "$75k to $110k", full: "between $75,000 and $110,000" },
      { label: "$110k and up", full: "$110,000 or more" },
    ];
    const np = s.net_price;
    const affordSection = !np ? "" : `
      <section id="affordability" class="module">
        <h2>Affordability: what students actually paid</h2>
        <p class="prose-line">Sticker prices hide what families really pay after grants and
          scholarships. Pick your family's income to see the typical yearly net price for
          students in that range.</p>
        <div class="income-toggle" role="group" aria-label="Family income">
          <button data-i="all">All families</button>
          ${INCOME.map((b,i)=>`<button data-i="${i}"${np.brackets[i]==null?" disabled":""}>${b.label}</button>`).join("")}
        </div>
        <div id="afford-result" class="afford-result"></div>
        <p class="afford-note">These are what past students paid after aid, not a quote for you. For a personal estimate, use the school's <a href="https://collegescorecard.ed.gov/school/?${unitid}" target="_blank" rel="noopener">net price calculator</a>. Net-price-by-income figures come from College Scorecard; the idea of ranking schools by what families at each income level actually pay was pioneered by <a href="https://www.tuitiontracker.org/" target="_blank" rel="noopener">TuitionTracker</a>.</p>
      </section>`;
    app.innerHTML = `
      <a class="backlink" href="/value-check/" id="back">← Find another college</a>
      <div class="school-head">
        <h1>${esc(s.name)}</h1>
        <div class="sub">${bits.join(" · ")}${website}</div>
      </div>
      <div class="modules" aria-label="Sections">
        ${modules.map(m => `
          <a class="mod${m.live ? " live" : " soon"}" ${m.live ? `href="#${m.anchor}"` : ""}>
            <span class="mod-name">${m.name}</span>
            <span class="mod-blurb">${m.blurb}</span>
            <span class="mod-tag">${m.live ? "Live" : "Coming soon"}</span>
          </a>`).join("")}
      </div>
      <section id="value-check" class="module">
        <h2>Value Check: do graduates out-earn a high-school graduate?</h2>
        <div class="summary">
          Of <b>${decided}</b> program${decided!==1?"s":""} with enough data to judge,
          <b style="color:#b42318">${s.n_fail}</b> leave graduates earning less than a typical high-school graduate
          and <b style="color:#067647">${s.n_pass}</b> out-earn one.
        </div>
        <p class="baseline">Baseline: a typical high-school graduate in ${esc(s.state)} earns about
          <b>${money(s.threshold)}</b> per year (median). Each bar compares a program's graduate
          earnings to that line.</p>
        <div class="vc-controls">
          <div class="toggle" role="group" aria-label="Filter programs">
            <button data-f="all" aria-pressed="true">All (${decided})</button>
            <button data-f="fail" aria-pressed="false">Falls short (${s.n_fail})</button>
            <button data-f="pass" aria-pressed="false">Passes (${s.n_pass})</button>
            <button data-f="insufficient" aria-pressed="false">Not enough data (${totI})</button>
          </div>
          <div class="vc-tools">
            <input id="prog-search" type="search" placeholder="Find a program…" aria-label="Find a program" />
            <select id="prog-sort" aria-label="Sort programs">
              <option value="premium">Sort: Premium</option>
              <option value="earnings">Sort: Earnings</option>
              <option value="debt">Sort: Debt</option>
              <option value="payback">Sort: Payback</option>
              <option value="grads">Sort: Graduates</option>
              <option value="name">Sort: A to Z</option>
            </select>
          </div>
        </div>
        <div id="proglist"></div>
      </section>
      ${affordSection}
      ${roiSection}
      ${mobilitySection}
      ${careersSection}
      <div class="caveats">
        <strong>How to read this.</strong> Figures are median earnings of a program's graduates,
        compared with the earnings of a typical high-school graduate in the school's state (the federal
        “earnings-premium” test). They describe past graduates, not a promise, and can't tell you what
        <em>you</em> would earn. Earnings are measured four years after completing where available;
        rows tagged “1-yr” use the one-year figure instead, so compare those cautiously. Programs
        with too few graduates to report are shown as “not enough data,” never guessed. For your
        own likely cost, use the school's
        <a href="https://collegescorecard.ed.gov/school/?${unitid}" target="_blank" rel="noopener">net price calculator</a>.
        Source: ${DATA_VINTAGE}. <a href="/#methodology">Methodology</a>.
      </div>`;
    const list = document.getElementById("proglist");
    const decidedProgs = progs.filter(p => p.flag !== "insufficient");
    const maxEarn = Math.max(1, ...decidedProgs.map(p => p.earnings || 0));
    const vstate = { filter: "all", search: "", sort: "premium" };
    const draw = () => {
      if (vstate.filter === "insufficient") {
        const ins = progs.filter(p => p.flag === "insufficient")
          .sort((a, b) => (a.program || "").localeCompare(b.program || ""));
        const bd = iparts.length ? ` (${iparts.join(" and ")})` : "";
        list.innerHTML = `<div class="insuff-view">
          <p class="insuff-note">${totI} program${totI !== 1 ? "s" : ""} don't have enough data to judge${bd}. ${whyHtml}</p>
          ${ins.length ? `<ul class="insuff-list">${ins.map(p => `<li>${esc(p.program)} <span class="deg">${esc(credShort(p.credential))}</span></li>`).join("")}</ul>` : ""}
        </div>`;
        return;
      }
      let shown = decidedProgs.filter(p =>
        vstate.filter === "all" ? true
        : vstate.filter === "fail" ? p.flag === "fails_earnings_premium"
        : p.flag === "passes_earnings_premium");
      if (vstate.search) shown = shown.filter(p => (p.program || "").toLowerCase().includes(vstate.search));
      shown = sortProgs(shown, vstate.sort, s.threshold);
      list.innerHTML = shown.length
        ? programTable(shown.map(p => programRow(p, s.threshold, maxEarn, programAnchor && anchorFor(p) === programAnchor)).join(""))
        : `<p class="empty">No programs in this view.</p>`;
      if (programAnchor) { const el = document.getElementById(programAnchor); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }
    };
    document.querySelectorAll(".toggle button").forEach(b =>
      b.addEventListener("click", () => {
        document.querySelectorAll(".toggle button").forEach(x => x.setAttribute("aria-pressed", x === b));
        vstate.filter = b.dataset.f;
        draw();
      }));
    const psearch = document.getElementById("prog-search");
    let st;
    psearch.addEventListener("input", () => {
      clearTimeout(st);
      st = setTimeout(() => { vstate.search = psearch.value.trim().toLowerCase(); draw(); }, 120);
    });
    document.getElementById("prog-sort").addEventListener("change", e => { vstate.sort = e.target.value; draw(); });
    draw();

    if (np) {
      const result = document.getElementById("afford-result");
      const showIncome = (i) => {
        if (i === "all") {
          result.innerHTML = np.avg != null
            ? `Across all families, students paid about <b class="big">${money(np.avg)}</b> per year on average.`
            : `<span class="empty">Average not reported.</span>`;
        } else {
          const price = np.brackets[i];
          result.innerHTML = price == null
            ? `<span class="empty">Not reported for this income range.</span>`
            : `Students from families earning <b>${INCOME[i].full}</b> typically paid about
               <b class="big">${money(price)}</b> per year.`;
        }
        document.querySelectorAll(".income-toggle button").forEach(b =>
          b.setAttribute("aria-pressed", b.dataset.i === String(i)));
        const u = new URLSearchParams(location.search);
        u.set("income", i);
        history.replaceState(Object.fromEntries(u), "", "?" + u.toString());
      };
      document.querySelectorAll(".income-toggle button").forEach(b =>
        b.addEventListener("click", () => showIncome(b.dataset.i === "all" ? "all" : +b.dataset.i)));
      const init = new URLSearchParams(location.search).get("income");
      if (init != null && init !== "all" && np.brackets[+init] != null) showIncome(+init);
      else showIncome("all");
    }

    wireBack();
  }

  function wireBack() {
    const b = document.getElementById("back");
    if (b) b.addEventListener("click", e => { e.preventDefault(); go({}); });
  }

  // ---- Router ----
  function route(params) {
    const school = params.school;
    if (school) renderSchool(school, params.program || null);
    else renderSearch(params.q || "");
  }
  window.addEventListener("popstate", e => route(e.state || Object.fromEntries(new URLSearchParams(location.search))));
  route(Object.fromEntries(new URLSearchParams(location.search)));

  // Back-to-top affordance
  const toTop = document.getElementById("to-top");
  toTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
  addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 500), { passive: true });
  // Subtle header shadow once scrolled
  addEventListener("scroll", () => document.querySelector(".site-header").classList.toggle("scrolled", scrollY > 8), { passive: true });
  </script>
</body>
</html>
